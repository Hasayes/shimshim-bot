name: ShimShim bot

on:
  schedule:
    - cron: "7,22,37,52 * * * *"   # every 15 min, offset to dodge the congested :00/:15/:30/:45 slots
  workflow_dispatch: {}        # allow manual runs from the Actions tab

# Let the job commit the updated state.json back to the repo
permissions:
  contents: write

concurrency:
  group: shimshim-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # GitHub fires the cron unreliably (observed 1-3h gaps despite the
      # 15-min schedule). Each fire therefore covers ~27 minutes with three
      # polling passes, and the concurrency group keeps one run queued, so
      # coverage is near-continuous while fires keep coming.
      - name: Poll and notify (3 passes)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_PROVIDER: ${{ vars.NEWS_PROVIDER || 'newsdata' }}
          VAPID_PRIVATE_KEY_PEM: ${{ secrets.VAPID_PRIVATE_KEY_PEM }}
          PUSH_SUBSCRIPTIONS: ${{ secrets.PUSH_SUBSCRIPTIONS }}
        run: |
          if [[ -n "$VAPID_PRIVATE_KEY_PEM" ]]; then
            echo "$VAPID_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/vapid.pem"
            export VAPID_PEM_FILE="$RUNNER_TEMP/vapid.pem"
          fi
          git config user.name "shimshim-bot"
          git config user.email "bot@users.noreply.github.com"
          persist() {
            if [[ -n "$(git status --porcelain state.json docs/feed.json)" ]]; then
              git add state.json docs/feed.json
              git commit -m "update state [skip ci]"
              # main may have moved while the poll ran — rebase and retry,
              # else sent cards are lost and the next run re-sends them
              n=0
              until git push; do
                n=$((n+1)); [ "$n" -gt 3 ] && return 1
                git pull --rebase -X theirs origin main
              done
            else
              echo "no state change"
            fi
          }
          for pass in 1 2 3; do
            echo "=== pass $pass ==="
            python shimshim_bot.py || echo "pass $pass failed" >&2
            persist
            if [ "$pass" -lt 3 ]; then
              sleep 780
              git pull --rebase -q origin main || true
            fi
          done
