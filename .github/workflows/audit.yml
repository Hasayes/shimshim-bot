name: Weekly feed audit

on:
  schedule:
    - cron: "0 6 * * 0"   # Sundays 06:00 UTC
  workflow_dispatch:
    inputs:
      dry:
        description: "Log verdicts only; no Telegram alert"
        required: false
        default: false
        type: boolean

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Audit the last week's cards
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AUDIT_DRY: ${{ github.event.inputs.dry == 'true' && '1' || '0' }}
        run: python audit_feed.py
        # set AUDIT_DRY=1 via env for silent test runs
