name: Romano transfer bot

on:
  schedule:
    - cron: "7,22,37,52 * * * *"   # every 15 min, offset to dodge the congested :00/:15/:30/:45 slots
  workflow_dispatch: {}        # allow manual runs from the Actions tab

# Let the job commit the updated state.json back to the repo
permissions:
  contents: write

concurrency:
  group: romano-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll and notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_PROVIDER: ${{ vars.NEWS_PROVIDER || 'newsdata' }}
        run: python romano_bot.py

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "romano-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "no state change"
          fi
