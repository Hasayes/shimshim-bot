name: push-test (temporary)

on:
  workflow_dispatch: {}

jobs:
  push-test:
    runs-on: ubuntu-latest
    steps:
      - run: pip install pywebpush
      - name: Send a test notification
        env:
          VAPID_PRIVATE_KEY_PEM: ${{ secrets.VAPID_PRIVATE_KEY_PEM }}
          PUSH_SUBSCRIPTIONS: ${{ secrets.PUSH_SUBSCRIPTIONS }}
        run: |
          echo "$VAPID_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/vapid.pem"
          python - <<'EOF'
          import json, os
          from pywebpush import webpush

          subs = json.loads(os.environ["PUSH_SUBSCRIPTIONS"])
          payload = json.dumps({
              "title": "🐶 ShimShim is paired!",
              "body": "Push notifications are working. Transfer alerts will arrive here.",
              "url": "./",
          })
          for sub in subs:
              webpush(sub, payload,
                      vapid_private_key=os.environ["RUNNER_TEMP"] + "/vapid.pem",
                      vapid_claims={"sub": "mailto:yuval0156@gmail.com"})
          print(f"sent to {len(subs)} subscription(s)")
          EOF
