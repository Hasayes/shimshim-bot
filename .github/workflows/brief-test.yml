name: brief-test (temporary)

on:
  workflow_dispatch: {}

jobs:
  brief-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Re-run the article that produced the wrong card
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'EOF'
          import anthropic
          from shimshim_bot import brief_article, RESEARCH_SYSTEM, CLAUDE_MODEL

          article = {
              "title": "Scholes and Butt issue immediate verdict on Youri Tielemans signing",
              "desc": "",
              "source": "yahoo",
          }
          client = anthropic.Anthropic()

          # debug: inspect the raw research response
          research = client.messages.create(
              model=CLAUDE_MODEL, max_tokens=4096, system=RESEARCH_SYSTEM,
              messages=[{"role": "user", "content": f"Headline: {article['title']}"}],
              tools=[{"type": "web_search_20260209", "name": "web_search", "max_uses": 3}],
          )
          print("stop_reason:", research.stop_reason)
          for b in research.content:
              t = getattr(b, "type", "?")
              if t == "web_search_tool_result":
                  c = b.content
                  print("  search result:", "ERROR " + str(c) if not isinstance(c, list) else f"{len(c)} hits")
              elif t == "text":
                  print("  text:", b.text[:400].replace("\n", " | "))
              else:
                  print("  block:", t)

          brief = brief_article(client, article)
          print("kind:", brief.kind, "| stage:", brief.stage)
          print("player:", brief.player, "| age:", brief.age)
          print("from:", brief.from_club, "->", brief.to_club)
          print("fee:", brief.fee, "| source:", brief.source)
          assert "tielemans" in brief.player.lower(), f"WRONG player: {brief.player}"
          assert "aston villa" in brief.from_club.lower(), f"WRONG from_club: {brief.from_club}"
          assert brief.age in ("29", "—"), f"WRONG age: {brief.age}"
          print("VERIFIED: player, from_club and age are correct")
          EOF
